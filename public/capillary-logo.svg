<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" fill="none">
  <!-- Butterfly Symbol -->
  <g transform="translate(8, 5)">
    <!-- Blue wing (top-left) -->
    <ellipse cx="22" cy="20" rx="14" ry="20" transform="rotate(-30 22 20)" fill="#2080BD"/>
    <!-- Orange-red wing (top-right) -->
    <ellipse cx="40" cy="18" rx="10" ry="22" transform="rotate(25 40 18)" fill="#DB5226"/>
    <!-- Green overlap (center-right) -->
    <ellipse cx="38" cy="32" rx="8" ry="18" transform="rotate(15 38 32)" fill="#399D49"/>
    <!-- Yellow wing (bottom-left) -->
    <ellipse cx="20" cy="38" rx="8" ry="16" transform="rotate(-15 20 38)" fill="#F3CF02"/>
    <!-- Green-teal center blend -->
    <ellipse cx="30" cy="28" rx="6" ry="10" fill="#399D49" opacity="0.6"/>
    <!-- Orange gradient on right wing -->
    <ellipse cx="42" cy="22" rx="6" ry="14" transform="rotate(20 42 22)" fill="url(#orangeGrad)" opacity="0.7"/>
    <!-- Green-yellow blend bottom -->
    <ellipse cx="26" cy="42" rx="5" ry="10" transform="rotate(-10 26 42)" fill="#78BD31" opacity="0.6"/>
  </g>

  <!-- "capillary" wordmark -->
  <text x="75" y="47" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" fill="#58595B" letter-spacing="1">capillary</text>

  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DB5226"/>
      <stop offset="100%" stop-color="#F3CF02"/>
    </linearGradient>
  </defs>
</svg>
